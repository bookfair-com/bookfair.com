<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookfair.com | Intercommunity Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #0f172a;
            --particle-color: rgba(99, 102, 241, 0.4);
            --card-bg: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #05070a;
            --text: #f1f5f9;
            --primary: #818cf8;
            --particle-color: rgba(129, 140, 248, 0.5);
            --card-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; }
        .logo { font-weight: 800; font-size: 1.8rem; color: var(--primary); letter-spacing: -1px; }

        /* Hero */
        .hero { padding: 100px 0 60px; text-align: center; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; margin-bottom: 20px; }
        
        /* Interactive Elements */
        .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Exo 2';
            font-weight: 600;
            transition: 0.3s;
        }

        .btn {
            padding: 18px 36px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-family: 'Exo 2';
            background: var(--primary);
            color: #fff;
        }

        /* Glass Cards */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin: 60px 0; }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px;
            transition: 0.3s;
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        footer { 
            padding: 60px 0; 
            text-align: center; 
            border-top: 1px solid var(--border); 
            font-size: 0.8rem; 
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <nav>
            <div class="logo">BOOKFAIR.COM</div>
            <button class="theme-btn" onclick="toggleTheme()">DARK/LIGHT MODE</button>
        </nav>

        <header class="hero">
            <h1>India's Leading <br><span style="color: var(--primary)">Intercommunity Marketplace</span></h1>
            <p style="margin: 20px 0 40px; font-size: 1.2rem; opacity: 0.8;">Buy second hand books and sell old books online at best prices. [cite: 5]</p>
            <button class="btn">POST A FREE AD</button>
        </header>

        <div class="book-grid">
            <div class="glass-card">
                <h3 style="margin-bottom: 10px;">Indian Art and Culture</h3>
                <p style="font-size: 0.9rem; opacity: 0.7;">ISBN 9789353168193 </p>
                <div style="font-size: 1.8rem; font-weight: 800; margin: 15px 0; color: var(--primary);">₹630</div>
                <button class="btn" style="width: 100%; font-size: 0.8rem; padding: 12px;">INITIATE BUY NOW</button>
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 10px;">History Book Children</h3>
                <p style="font-size: 0.9rem; opacity: 0.7;">Posted by Joy Das [cite: 168]</p>
                <div style="font-size: 1.8rem; font-weight: 800; margin: 15px 0; color: var(--primary);">₹700</div>
                <button class="btn" style="width: 100%; font-size: 0.8rem; padding: 12px;">INITIATE BUY NOW</button>
            </div>
        </div>

        <footer>
            COPYRIGHT © 2026 BOOKFAIR | BOOLEAN INFOTECH SOLUTIONS 
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let particleColor = getComputedStyle(document.documentElement).getPropertyValue('--particle-color');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = particleColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function toggleTheme() {
            const root = document.documentElement;
            const isDark = root.getAttribute('data-theme') === 'dark';
            root.setAttribute('data-theme', isDark ? 'light' : 'dark');
            
            // Sync particle colors with theme
            setTimeout(() => {
                particleColor = getComputedStyle(document.documentElement).getPropertyValue('--particle-color');
            }, 100);
        }

        window.addEventListener('resize', resize);
        resize();
        init();
        animate();
    </script>
</body>
</html>
