<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookfair.com | Intercommunity Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #fdfdfd;
            --text: #050505;
            --card-bg: rgba(255, 255, 255, 0.98);
            --border: #000000;
            --particle-rgb: 99, 102, 241;
        }

        [data-theme="dark"] {
            --bg: #030407;
            --text: #ffffff;
            --primary: #a855f7;
            --card-bg: rgba(10, 15, 25, 0.98);
            --border: #ffffff;
            --particle-rgb: 168, 85, 247;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.5s ease;
            overflow-x: hidden;
        }

        /* --- THE PARTICLE ENGINE --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        .content-layer { position: relative; z-index: 10; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; }
        .logo { font-weight: 900; font-size: 2.2rem; color: var(--primary); letter-spacing: -2px; }

        /* Hero */
        .hero { padding: 60px 0; text-align: center; }
        .hero h1 { 
            font-size: clamp(3rem, 10vw, 5.5rem); 
            font-weight: 900; 
            line-height: 0.85;
            margin-bottom: 25px;
            letter-spacing: -3px;
            text-transform: uppercase;
        }
        .hero p { 
            font-size: 1.4rem; 
            font-weight: 700;
            background: var(--text);
            color: var(--bg);
            display: inline-block;
            padding: 10px 25px;
            margin-bottom: 40px;
        }

        /* Stronger Description Boxes */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; margin-bottom: 80px; }
        
        .glass-card {
            background: var(--card-bg);
            border: 4px solid var(--border);
            padding: 45px;
            box-shadow: 15px 15px 0px var(--primary);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover { transform: translate(-8px, -8px); box-shadow: 25px 25px 0px var(--primary); }

        .label { font-weight: 900; color: var(--primary); font-size: 0.9rem; margin-bottom: 15px; display: block; letter-spacing: 2px; }
        .glass-card h3 { font-size: 2rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; }

        .price-tag { font-size: 2.8rem; font-weight: 900; color: var(--text); margin: 20px 0; }

        .btn {
            width: 100%;
            padding: 24px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border: 3px solid var(--border);
            background: var(--text);
            color: var(--bg);
            transition: 0.2s;
        }

        .btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .theme-btn {
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        footer { 
            padding: 100px 0; 
            text-align: center; 
            font-weight: 900; 
            background: var(--text);
            color: var(--bg);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .glass-card { padding: 30px; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="content-layer">
        <div class="container">
            <nav>
                <div class="logo">BOOKFAIR.COM</div>
                <button class="theme-btn" onclick="toggleTheme()">Atmosphere Switch</button>
            </nav>

            <header class="hero">
                <h1>Unlock Your<br><span style="color: var(--primary)">Shelf's Value.</span></h1>
                <p>Intercommunity Marketplace for Rare & Used Books</p>
            </header>

            <div class="book-grid">
                <div class="glass-card">
                    <span class="label">COLLEGE / UPSC</span>
                    <h3>Indian Art and Culture</h3>
                    <p style="font-weight: 700; opacity: 0.7;">Author: Nitin Singhania</p>
                    <div class="price-tag">₹630</div>
                    <button class="btn">Initiate Exchange</button>
                </div>

                <div class="glass-card">
                    <span class="label">HISTORY / KIDS</span>
                    <h3>History Book Children</h3>
                    <p style="font-weight: 700; opacity: 0.7;">Seller: Joy Das</p>
                    <div class="price-tag">₹700</div>
                    <button class="btn">Initiate Exchange</button>
                </div>
            </div>

            <footer>
                © 2026 BOOKFAIR | BOOLEAN INFOTECH SOLUTIONS
            </footer>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let hue = 240;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 3; // Bigger dots
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.colorHue = (hue + Math.random() * 50 - 25) % 360;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) this.reset();
            }
            draw() {
                ctx.fillStyle = `hsla(${this.colorHue}, 70%, 60%, 0.6)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        ctx.strokeStyle = `hsla(${particles[i].colorHue}, 70%, 50%, ${1 - dist/180})`;
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hue += 0.1;
            particles.forEach(p => { p.update(); p.draw(); });
            drawLines();
            requestAnimationFrame(animate);
        }

        function toggleTheme() {
            const root = document.documentElement;
            const current = root.getAttribute('data-theme');
            root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        window.addEventListener('resize', () => { resize(); init(); });
        resize(); init(); animate();
    </script>
</body>
</html>
